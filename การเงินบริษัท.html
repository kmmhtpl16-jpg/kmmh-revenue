<style>

<script>
/* ================= ค่าคงที่ + ยูทิล ================= */
const SB_URL="https://hfystbdqjhftrlelmkjm.supabase.co";
const SB_KEY="sb_publishable_Cz_p8O1rAs2ohPDtnKS_BA_LYUGiw8r";
const LOGIN_FN_URL=SB_URL+"/functions/v1/login";
const OWNER_PIN="0402";
const ROLE_PINS={"0402":"owner","9989":"finance"};
let ROLE=null;
let sb=null; try{ sb=window.supabase.createClient(SB_URL,SB_KEY);}catch(e){console.warn("sb init",e);}

const num=v=>(typeof v==="number")?v:(parseFloat(String(v==null?"":v).replace(/,/g,""))||0);
const r2=n=>Math.round((+n||0)*100)/100;
const TH=n=>(n==null||isNaN(n))?"—":Number(n).toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2});
const TH0=n=>(n==null||isNaN(n))?"—":Number(n).toLocaleString("th-TH",{maximumFractionDigits:0});
const beDate=s=>{ if(!s) return "—"; const p=String(s).slice(0,10).split("-"); return p[2]+"/"+p[1]+"/"+(parseInt(p[0])+543); };
const monthKey=s=>String(s||"").slice(0,7);
const beMonth=mk=>{ const p=String(mk).split("-"); const mn=["","ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."]; return (mn[parseInt(p[1])]||p[1])+" "+(parseInt(p[0])+543); };
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function pad2(n){return String(n).padStart(2,"0");}
function isoFromExcel(v){
  if(v==null) return null;
  if(typeof v==="number" && window.XLSX && XLSX.SSF){ const dc=XLSX.SSF.parse_date_code(v); if(dc){ let y=dc.y; if(y>2400)y-=543; return y+"-"+pad2(dc.m)+"-"+pad2(dc.d); } }
  if(v instanceof Date && !isNaN(v)){ let y=v.getFullYear(); if(y>2400)y-=543; return y+"-"+pad2(v.getMonth()+1)+"-"+pad2(v.getDate()); }   // local ไม่ใช่ UTC
  const s=String(v).trim();
  let m=s.match(/(\d{4})-(\d{2})-(\d{2})/); if(m){ let y=+m[1]; if(y>2400)y-=543; return y+"-"+m[2]+"-"+m[3]; }
  m=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/); if(m){ let d=+m[1],mo=+m[2],y=+m[3]; if(y<100)y+=(y>50?2500:2000); if(y>2400)y-=543; return y+"-"+pad2(mo)+"-"+pad2(d); }
  return null;
}

/* หมวดรายจ่ายมาตรฐาน (COGS = ต้นทุนสินค้า) */
const CATS_DEFAULT=["ค่าซื้อสินค้า","ค่าแรง/เงินเดือน","ค่าขนส่ง","ค่าน้ำ-ไฟ-โทรศัพท์","ค่าเช่า","ค่าธรรมเนียม/ดอกเบี้ย","ภาษี","ซ่อมบำรุง","ของใช้สำนักงาน","การตลาด","อื่นๆ"];
function loadCustomCats(){ try{ const a=JSON.parse(localStorage.getItem("rev_custom_cats")||"[]"); return Array.isArray(a)?a:[]; }catch(e){ return []; } }
function saveCustomCats(a){ try{ localStorage.setItem("rev_custom_cats",JSON.stringify(a)); }catch(e){} }
/* รวมหมวดมาตรฐาน + หมวดที่ผู้ใช้เพิ่มเอง โดยให้ "อื่นๆ" อยู่ท้ายสุดเสมอ */
function allCats(){
  const merged=CATS_DEFAULT.filter(c=>c!=="อื่นๆ");
  loadCustomCats().forEach(c=>{ if(!merged.includes(c)) merged.push(c); });
  merged.push("อื่นๆ");
  return merged;
}
const catOptions=(sel)=>allCats().map(c=>`<option${c===sel?" selected":""}>${esc(c)}</option>`).join("");
/* ===== เงินสดย่อย: แม็พผังบัญชี -> หมวดรายจ่ายของหน้านี้ ===== */
const PC_CAT_MAP={
  "5113":"ค่าขนส่ง","5222":"ค่าขนส่ง",
  "5211-10":"ค่าแรง/เงินเดือน","5221-40":"ค่าแรง/เงินเดือน",
  "5211-20":"ค่าจ้างเหมา",
  "5221-30":"ค่าน้ำมัน",
  "5221-60":"ค่าอาหารและเครื่องดื่ม",
  "5231":"ซ่อมบำรุง"
};
/* รหัสที่ไม่ใช่รายจ่ายจริง (เงินสำรอง/เงินคืน) — ต้องไม่นับ */
const PC_SKIP_PREFIX=["1111"];
function pcCode(acc){ return String(acc||"").trim().split(/\s+/)[0]; }
function pcIsExpense(r){
  const c=pcCode(r.acc_code);
  if(!c) return false;
  if(PC_SKIP_PREFIX.some(p=>c.startsWith(p))) return false;
  if(r.is_return) return false;
  return (r.tx_type||"expense")==="expense";
}
/* 🛡️ รหัสบัญชีที่ยังไม่ได้จัดหมวด — เก็บไว้ขึ้นแถบเตือน แทนที่จะซุกลง "อื่นๆ" เงียบๆ */
const PC_UNMAPPED=new Map();   // code -> {label, n, amount}
function pcCat(acc){
  const c=pcCode(acc);
  const hit=PC_CAT_MAP[c] || PC_CAT_MAP[c.slice(0,4)];
  return hit || "อื่นๆ";
}
function pcNoteUnmapped(r){
  const c=pcCode(r.acc_code);
  if(!c || PC_CAT_MAP[c] || PC_CAT_MAP[c.slice(0,4)]) return;
  const cur=PC_UNMAPPED.get(c)||{label:pcLabel(r.acc_code),n:0,amount:0};
  cur.n++; cur.amount+=num(r.amount); PC_UNMAPPED.set(c,cur);
}
function pcLabel(acc){
  const raw=String(acc||"").trim();
  const sp=raw.indexOf(" ");
  return sp>0?raw.slice(sp+1):raw;
}
/* แถวเสมือน: อ่านอย่างเดียว แก้ที่โปรแกรมเงินสดย่อยเท่านั้น */
function pcToExpRow(r){
  pcNoteUnmapped(r);
  const detail=(r.description||"").trim()||pcLabel(r.acc_code);
  return {
    id:"pc:"+r.id, exp_date:r.tx_date, category:pcCat(r.acc_code),
    description:detail+(r.by_name?" · "+r.by_name:""),
    amount:r.amount, source:"petty_cash", is_cogs:false,
    acc_code:r.acc_code, ref:pcLabel(r.acc_code), pay_status:null, _ro:true
  };
}
const isVirtual=id=>String(id||"").startsWith("pc:");

/* ===== 🛡️ เงินออก "ค่าซื้อสินค้า" ที่ยังไม่ได้ผูกกับบิลซื้อ (ตรวจจากข้อมูล ไม่ผูกชื่อร้าน) =====
   เคสจริง: จ่ายเจ้าหนี้ไปแล้ว แต่บิลใน ACC-BILLING ยังไม่มียอด/ยังไม่นำเข้า → ต้นทุนต่ำกว่าจริง
   และถ้านำเข้าบิลทีหลังโดยไม่จับคู่ จะนับต้นทุน 2 ครั้ง */
function buildUnbilledPayouts(){
  const paid=STATE.exp.filter(x=>x.source==="statement"&&x.is_cogs);   /* settlement ถูกจับคู่แล้ว ไม่เข้าเงื่อนไข */
  const open=STATE.exp.filter(x=>x.source==="acc_billing"&&x.pay_status!=="paid");
  return paid.map(x=>{
    const amt=r2(x.amount);
    const exact=open.some(b=>r2(b.amount)===amt);
    return {x, amt, hint: exact?"มีบิลค้างจ่ายยอดตรงกัน — กด 🔗 จ่ายบิลซื้อ เพื่อจับคู่"
                             :(open.length?"ไม่พบบิลยอดตรง — ตรวจว่าคีย์ยอดที่ ACC-BILLING แล้วหรือยัง"
                                          :"ไม่มีบิลซื้อค้างจ่ายในช่วงนี้เลย — บิลอาจยังไม่ถูกคีย์ยอด/นำเข้า")};
  });
}

/* ===== จับคู่ชื่อคนในสเตทเมนต์กับใบสำคัญจ่าย payroll ===== */
function normName(s){
  return String(s||"")
    .replace(/\+\+/g,"")
    .replace(/^โอนไป\s*/,"")
    .replace(/เพื่อชำระ/g,"")
    .replace(/\b(GSB|SCB|KTB|TTB|UOBT|UOB|BBL|KBANK|BAY|KKP|CIMB|GHB|BAAC|Ref|QR)\b/gi,"")
    .replace(/X\d+/gi,"")
    .replace(/(นางสาว|น\.ส\.|นาง|นาย)/g,"")
    .replace(/[\s.\-]/g,"");
}
function nameHit(a,b){
  a=normName(a); b=normName(b);
  if(a.length<4||b.length<4) return false;
  return a.startsWith(b)||b.startsWith(a);
}
const dShift=(d,n)=>{ const t=new Date(d+"T00:00:00Z"); t.setUTCDate(t.getUTCDate()+n); return t.toISOString().slice(0,10); };

/* คืน {map: {expId:{nick,vno,vdate}}, cards:[...]} — ไม่บวกยอดใดๆ เข้ารายจ่าย */
let PAY_KEY_WARN=null;   // 🛡️ เตือนถ้า payroll เปลี่ยนชื่อคีย์ to_pay
function buildPayrollMatch(){
  const map={}, cards=[], used=new Set();
  PAY_KEY_WARN=null;
  let lnTot=0, lnNoKey=0;
  (STATE.vouchers||[]).forEach(v=>(Array.isArray(v.lines)?v.lines:[]).forEach(ln=>{
    lnTot++; if(!ln || !Object.prototype.hasOwnProperty.call(ln,"to_pay")) lnNoKey++;
  }));
  if(lnTot && lnNoKey===lnTot) PAY_KEY_WARN={lnTot,lnNoKey,keys:[...new Set((STATE.vouchers||[]).flatMap(v=>(Array.isArray(v.lines)?v.lines:[]).flatMap(ln=>Object.keys(ln||{}))))].slice(0,12)};
  else if(lnNoKey) PAY_KEY_WARN={lnTot,lnNoKey,keys:[]};
  const stmt=STATE.exp.filter(x=>x.source==="statement");
  (STATE.vouchers||[]).forEach(v=>{
    const lines=Array.isArray(v.lines)?v.lines:[];
    const lo=dShift(v.vdate,-1), hi=dShift(v.vdate,3);
    const det=[]; let trTot=0, cashTot=0;
    lines.forEach(ln=>{
      const need=r2(ln.to_pay);
      if(need<=0){ det.push({nick:ln.nickname,amt:0,st:"none"}); return; }
      const c=stmt.find(sx=>!used.has(sx.id)&&r2(sx.amount)===need&&sx.exp_date>=lo&&sx.exp_date<=hi&&nameHit(ln.full_name,sx.ref||sx.description));
      if(c){ used.add(c.id); map[c.id]={nick:ln.nickname,vno:v.voucher_no,vdate:v.vdate}; trTot+=need; det.push({nick:ln.nickname,amt:need,st:"transfer"}); }
      else { cashTot+=need; det.push({nick:ln.nickname,amt:need,st:"cash"}); }
    });
    const pcTot=STATE.exp.filter(x=>x.source==="petty_cash"&&x.exp_date===v.vdate&&pcCode(x.acc_code)==="5211-10")
                         .reduce((s,x)=>s+num(x.amount),0);
    const noStmt=!stmt.some(sx=>sx.exp_date>=lo&&sx.exp_date<=hi);
    cards.push({v,det,trTot,cashTot,pcTot,noStmt,diff:r2(num(v.total_amount)-(trTot+pcTot))});
  });
  return {map,cards};
}

/* ===== ค่าเที่ยว: ระบบจัดส่งเสนอ vs จ่ายจริงใน payroll (ไม่นับเป็นรายจ่ายเพิ่ม) ===== */
const isTripLabel=l=>/ค่าเที่ยว/.test(String(l||""));
let TRIP_LABEL_WARN=false;
function buildTripCheck(){
  const from=gFrom(), to=gTo();
  const yms=[...new Set([from.slice(0,7), to.slice(0,7)].concat(
    (STATE.trips||[]).map(t=>t.ym)).filter(m=>m>=from.slice(0,7)&&m<=to.slice(0,7)))].sort().reverse();
  /* ค่าเที่ยวที่จ่ายจริง: อ่านจาก income_items ในใบสำคัญจ่ายทุกใบ (ไม่จำกัดช่วง) จับเดือนจากวันที่ใบ */
  const paid={};
  (STATE.vouchersAll||[]).forEach(v=>{
    const ym=String(v.vdate||"").slice(0,7);
    (Array.isArray(v.lines)?v.lines:[]).forEach(ln=>{
      (ln.income_items||[]).filter(it=>isTripLabel(it.label)).forEach(it=>{
        paid[ym]=paid[ym]||{};
        paid[ym][ln.nickname]=(paid[ym][ln.nickname]||0)+num(it.amount);
      });
    });
  });
  /* 🛡️ ถ้ามีใบเสนอค่าเที่ยว แต่ไม่เจอ label "ค่าเที่ยว" ในใบสำคัญจ่ายเลยสักใบ = ฝั่ง payroll อาจเปลี่ยนคำ */
  TRIP_LABEL_WARN=(STATE.trips||[]).length>0 && Object.keys(paid).length===0;
  return yms.map(ym=>{
    const props=(STATE.trips||[]).filter(t=>t.ym===ym);
    const pd=paid[ym]||{};
    const names=[...new Set(props.map(p=>p.nickname).concat(Object.keys(pd)))];
    const rows=names.map(n=>{
      const p=props.find(x=>x.nickname===n);
      const prop=p?num(p.amount):null, pay=pd[n]!=null?r2(pd[n]):null;
      let st="ok";
      if(prop==null) st="noprop"; else if(pay==null) st="nopay"; else if(Math.abs(prop-pay)>=1) st="diff";
      return {n,prop,pay,trips:p?p.trips:null,status:p?p.status:null,st};
    }).sort((a,b)=>(b.prop||0)-(a.prop||0));
    const propTot=rows.reduce((s,r)=>s+(r.prop||0),0), payTot=rows.reduce((s,r)=>s+(r.pay||0),0);
    return {ym,rows,propTot,payTot,bad:rows.filter(r=>r.st!=="ok").length};
  }).filter(c=>c.rows.length);
}

/* ================= ช่วงเวลา ================= */
function quick(k){
  const now=new Date(); let f,t;
  if(k==="m"){ f=new Date(now.getFullYear(),now.getMonth(),1); t=new Date(now.getFullYear(),now.getMonth()+1,0); }
  else if(k==="pm"){ f=new Date(now.getFullYear(),now.getMonth()-1,1); t=new Date(now.getFullYear(),now.getMonth(),0); }
  else { f=new Date(now.getFullYear(),0,1); t=new Date(now.getFullYear(),11,31); }
  const iso=d=>d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());
  document.getElementById("from").value=iso(f); document.getElementById("to").value=iso(t);
}
const gFrom=()=>document.getElementById("from").value;
const gTo=()=>document.getElementById("to").value;

let STATE={daily:[],audit:[],exp:[],petty:[],vouchers:[],vouchersAll:[],trips:[],payMatch:{},payCards:[]};
async function reloadAll(){
  if(!sb) return;
  const from=gFrom(), to=gTo(); const msg=document.getElementById("loadmsg"); msg.textContent="กำลังโหลด…";
  try{
    const [d,a,e,pc,pv,tp]=await Promise.all([
      sb.from("rev_daily").select("*").gte("date",from).lte("date",to).order("date"),
      sb.from("rev_audit").select("date,machine_net,status").gte("date",from).lte("date",to).order("date"),
      (ROLE==="owner" ? sb.from("rev_expenses").select("*").gte("exp_date",from).lte("exp_date",to).order("exp_date") : Promise.resolve({data:[]})),
      (ROLE==="owner" ? sb.from("petty_cash_transactions").select("id,tx_date,tx_type,acc_code,description,amount,is_return,by_name").gte("tx_date",from).lte("tx_date",to) : Promise.resolve({data:[]})),
      /* 🛡️ กรองที่ query: ใบสำคัญจ่ายเฉพาะรอบๆ ช่วงที่ดู (±45 วัน ครอบใบสิ้นเดือนที่การ์ดค่าเที่ยวต้องใช้) */
      (ROLE==="owner" ? sb.from("payout_vouchers").select("voucher_no,cycle_date,created_at,total_amount,employee_count,lines,status").eq("status","approved").gte("created_at",dShift(from,-45)).lte("created_at",dShift(to,45)+"T23:59:59") : Promise.resolve({data:[]})),
      (ROLE==="owner" ? sb.from("trip_pay_proposals").select("ym,nickname,full_name,amount,trips,status,source") : Promise.resolve({data:[]}))
    ]);
    if(d.error||a.error||e.error){ msg.textContent="โหลดไม่สำเร็จ: "+((d.error||a.error||e.error).message); return; }
    STATE.daily=d.data||[]; STATE.audit=a.data||[];
    /* เงินสดย่อย: ใบเสร็จรายจ่ายจริงเท่านั้น (ตัดเงินสำรอง 1111-30 / เงินคืน 1111-10) */
    PC_UNMAPPED.clear();
    STATE.petty=(pc&&!pc.error?(pc.data||[]):[]).filter(pcIsExpense);
    /* payroll: ใบสำคัญจ่ายที่อนุมัติแล้ว — ใช้กระทบยอดเท่านั้น ไม่นับเป็นรายจ่าย */
    STATE.vouchersAll=(pv&&!pv.error?(pv.data||[]):[])
      .map(v=>Object.assign({},v,{vdate:v.cycle_date||String(v.created_at||"").slice(0,10)}))
      .sort((x,y)=>x.vdate<y.vdate?1:-1);
    STATE.vouchers=STATE.vouchersAll.filter(v=>v.vdate>=from&&v.vdate<=to);
    /* ค่าเที่ยวจากระบบจัดส่ง — ใช้ตรวจสอบเท่านั้น จ่ายจริงผ่าน payroll */
    STATE.trips=(tp&&!tp.error?(tp.data||[]):[]);
    STATE.exp=(e.data||[]).concat(STATE.petty.map(pcToExpRow));
    msg.textContent="ช่วง "+beDate(from)+" – "+beDate(to)+" · โหลดแล้ว";
    renderAll();
  }catch(err){ msg.textContent="ผิดพลาด: "+err.message; }
}

/* แหล่งข้อมูล: source ในฐานข้อมูล + "payroll" (แถวเงินโอนออกที่จับคู่ใบสำคัญจ่ายได้) */
/* Shopee เขียน source 3 แบบ: shopee-auto (ค่าธรรมเนียมรายบิล) · shopee_fee/shopee_income (ปุ่มดันรายเดือน) */
const isShopeeSrc=s=>s==="shopee-auto"||s==="shopee_fee"||s==="shopee_income";
const SRC_LABEL={petty_cash:"🟣 เงินสดย่อย",payroll:"💼 เงินเดือน (payroll)",statement:"🏦 สเตทเมนต์",acc_billing:"📥 ACC-BILLING",shopee:"🛒 Shopee",manual:"✍️ กรอกมือ"};
const SRC_ORDER=["petty_cash","payroll","statement","acc_billing","shopee","manual"];
function srcKeys(x){
  const s=x.source||"manual";
  const k=[isShopeeSrc(s)?"shopee":(SRC_LABEL[s]?s:"manual")];
  if(STATE.payMatch && STATE.payMatch[x.id]) k.push("payroll");   // แถวเดียวอยู่ได้ 2 แหล่ง
  return k;
}
window.setExpFilter=function(){
  const c=document.getElementById("f_cat"), p=document.getElementById("f_pay"), s=document.getElementById("f_src");
  EXPF.cat=c?c.value:""; EXPF.pay=p?p.value:""; EXPF.src=s?s.value:"";
  renderExpense();
};
window.clearExpFilter=function(){ EXPF={cat:"",pay:"",src:""}; renderExpense(); };
function renderExpense(){
  const el=document.getElementById("p_expense");
  const PM=buildPayrollMatch(); STATE.payMatch=PM.map; STATE.payCards=PM.cards;

  const recorded=new Set(STATE.exp.filter(x=>x.source==="statement"||x.source==="settlement").map(x=>x.exp_date+"|"+r2(x.amount)+"|"+(x.ref||"")));
  let wdHtml="", wdCount=0;
  STATE.daily.forEach(d=>{
    (d.bank_rows||[]).filter(r=>num(r.wd)>0).forEach((r,i)=>{
      const amt=r2(r.wd), ref=String(r.detail||""), key=d.date+"|"+amt+"|"+ref, done=recorded.has(key);
      if(done) return;   // ซ่อนรายการที่ลงบันทึกแล้ว เพื่อดันรายการที่ยังไม่ลงขึ้นมา
      wdCount++;
      wdHtml+=`<tr><td>${beDate(d.date)}</td><td>${esc(r.ch||"")}</td><td>${esc(ref)}</td><td class="n">${TH(amt)}</td>

         <button class="btn sm blu" onclick="addStmtExp('${d.date}',${amt},this,'wc_${d.date}_${i}',${JSON.stringify(ref).replace(/"/g,'&quot;')})">➕ ลงรายจ่าย</button>
         <button class="btn sm" style="background:#f59e0b;color:#fff" onclick="openMatchBill('${d.date}',${amt},${JSON.stringify(ref).replace(/"/g,'&quot;')})">🔗 จ่ายบิลซื้อ</button></td></tr>`;
    });

/* ---- อัป ACC-BILLING ---- */
function loadAcc(input){
  const f=input.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:"binary"});   // ห้ามใส่ cellDates:true — ทำให้วันที่เพี้ยน -1 วัน
      const ws=wb.Sheets[wb.SheetNames[0]];
      const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      // ตรวจว่าเป็นฟอร์แมต "รายงานซื้อ แยกตามวันที่" ของ ACC-BILLING หรือไม่
      const hasBillNo=aoa.some(r=>(r||[]).some(c=>String(c).includes("เลขที่บิลซื้อ")));
      const hasProjDate=aoa.some(r=>(r||[]).some(c=>String(c).indexOf("ประจำวันที่")===0));
      if(hasBillNo && hasProjDate){ const p=parseAccBill(aoa); _accRows={mode:"accbill",items:p.items,foot:p.foot}; }
      else if(hasBillNo){ const p=parseAccBillCols(aoa); _accRows={mode:"accbill",items:p.items,foot:p.foot}; }
      else {
        // ฟอร์แมตทั่วไป: หาแถวหัวตาราง = แถวแรกที่มีเซลล์ไม่ว่าง >= 2
        let hi=0; for(let i=0;i<Math.min(aoa.length,15);i++){ if(aoa[i].filter(c=>String(c).trim()!=="").length>=2){ hi=i; break; } }
        _accRows={mode:"generic",aoa,hi,header:aoa[hi]||[]};
      }
    }catch(e){ alert("อ่านไฟล์ไม่ได้: "+e.message); _accRows=null; }
    renderAccMap();
  };
  rd.readAsBinaryString(f);
}
/* อ่านรายงานซื้อ ACC-BILLING แบบ "แยกตามวันที่": หัวข้อ ประจำวันที่ คั่นกลุ่ม + รายบิล + แถวยอดรวมรายวัน (ข้าม) */
function parseAccBill(aoa){
  const items=[]; let cur=null; const foot={cash:0,cn:0,grand:0};
  const maxNum=row=>row.reduce((m,c)=>Math.max(m,num(c)),0);
  for(let i=0;i<aoa.length;i++){
    const row=aoa[i]||[];
    const c0=String(row[0]||"").trim(), c1=String(row[1]||"").trim(), c3=String(row[3]||"").trim();
    if(c1.indexOf("ประจำวันที่")===0){ const iso=isoFromExcel(row[2]); if(iso) cur=iso; continue; }
    const rowText=row.map(x=>String(x==null?"":x)).join(" ");
    if(rowText.includes("ซื้อสด")){ foot.cash=maxNum(row); continue; }        // เอาค่าสุดท้าย (สรุปซ้ำหลายหน้า)
    if(rowText.includes("ใบลดหนี้")){ foot.cn=maxNum(row); continue; }
    if(rowText.includes("รวมทั้งหมด")){ foot.grand=maxNum(row); continue; }
    if(!c0) continue;                 // แถวยอดรวมรายวัน/หัวข้อหมวด/แถว รวม (คอลัมน์แรกว่าง) = ข้าม กันนับซ้ำ
    if(c0==="เลขที่") continue;        // แถวหัวตาราง
    const net=num(row[6]), goods=num(row[4]); const amt=r2(net>0?net:goods);
    if(!(amt>0) || !cur) continue;
    items.push({exp_date:cur, amount:amt, description:c3, ref:(c1||c0)});
  }
  return {items,foot};
}
/* รายงานซื้อ ACC-BILLING แบบมี "คอลัมน์วันที่" ในตัว (ไม่มีหัวข้อ ประจำวันที่ คั่นกลุ่ม) */
function parseAccBillCols(aoa){
  const items=[]; const foot={cash:0,cn:0,grand:0};
  let hi=-1; for(let i=0;i<aoa.length;i++){ if((aoa[i]||[]).some(c=>String(c).includes("เลขที่บิลซื้อ"))){ hi=i; break; } }
  if(hi<0) return {items,foot};
  const H=aoa[hi]||[];
  const find=(...kw)=>{ for(const k of kw){ for(let j=0;j<H.length;j++){ if(String(H[j]).includes(k)) return j; } } return -1; };
  const cDate=find("วันที่"), cRef=find("เลขที่บิลซื้อ"), cName=find("ชื่อผู้ขาย","ผู้ขาย"),
        cNet=find("สุทธิ"), cGoods=find("มูลค่า");
  const maxNum=row=>row.reduce((m,c)=>Math.max(m,num(c)),0);
  for(let i=hi+1;i<aoa.length;i++){
    const row=aoa[i]||[];
    const rowText=row.map(x=>String(x==null?"":x)).join(" ");
    if(rowText.includes("ซื้อสด")){ foot.cash=Math.max(foot.cash,maxNum(row)); continue; }
    if(rowText.includes("ใบลดหนี้")){ foot.cn=Math.max(foot.cn,maxNum(row)); continue; }
    if(rowText.includes("รวมทั้งหมด")){ foot.grand=Math.max(foot.grand,maxNum(row)); continue; }
    const iso=cDate>=0?isoFromExcel(row[cDate]):null;
    const net=cNet>=0?num(row[cNet]):0, goods=cGoods>=0?num(row[cGoods]):0;
    const amt=r2(net>0?net:goods);
    if(!iso || !(amt>0)) continue;   /* ข้ามแถวหัวข้อหมวด/ยอดรวม/บิลยอดว่าง */
    items.push({exp_date:iso, amount:amt, description:cName>=0?String(row[cName]||"").trim():"", ref:cRef>=0?String(row[cRef]||"").trim():""});
  }
  return {items,foot};
}

function accParse(){
  const ci=+document.getElementById("ac_amt").value, di=+document.getElementById("ac_date").value, xi=+document.getElementById("ac_desc").value;
  const fb=document.getElementById("ac_fallback").value;
  const out=[];
  for(let i=_accRows.hi+1;i<_accRows.aoa.length;i++){
    const row=_accRows.aoa[i]; if(!row) continue;
    const amt=r2(num(row[ci])); if(!(amt>0)) continue;
    let date=di>=0?isoFromExcel(row[di]):null; if(!date) date=fb;
    const desc=xi>=0?String(row[xi]||"").trim():"";
    out.push({exp_date:date,amount:amt,description:desc});
  }
  return out;
}
function previewAcc(){
  const rows=accParse(); const tot=rows.reduce((s,r)=>s+r.amount,0);
  const prev=rows.slice(0,12).map(r=>`<tr><td>${beDate(r.exp_date)}</td><td>${esc(r.description)}</td><td class="n">${TH(r.amount)}</td></tr>`).join("");
  document.getElementById("acc_prev").innerHTML=`
    <div class="muted" style="margin-top:8px">พบ ${rows.length} รายการ · รวม ${TH(tot)} บาท (แสดง 12 แถวแรก)</div>
    <table><thead><tr><th>วันที่</th><th>รายละเอียด</th><th class="n">จำนวน</th></tr></thead><tbody>${prev}</tbody></table>
    <button class="btn" style="margin-top:8px" onclick="saveAcc()">💾 บันทึกทั้งหมด (${rows.length} รายการ)</button>`;
}
async function saveAcc(){
  const cat=document.getElementById("ac_cat").value, cogs=document.getElementById("ac_cogs").checked;
  let items;
  if(_accRows.mode==="accbill"){ items=_accRows.items||[]; }
  else { items=accParse().map(r=>({exp_date:r.exp_date,amount:r.amount,description:r.description,ref:"ACC-BILLING"})); }
  if(!items.length){ alert("ไม่พบรายการ"); return; }
  /* กันซ้ำ: ถ้ามี "เลขที่บิล" จริง ใช้เลขบิลเป็นกุญแจ (ไม่ผูกวันที่/ยอด — กันเคสวันที่เพี้ยนหรือแก้ยอดแล้วเข้าซ้ำ)
     ถ้าไม่มีเลขบิล (ไฟล์รูปแบบอื่น ref="ACC-BILLING") ค่อยใช้ วันที่+ยอด+อ้างอิง */
  const hasRef=i=>!!i.ref && i.ref!=="ACC-BILLING";
  const {data:ex}=await sb.from("rev_expenses").select("exp_date,amount,ref").eq("source","acc_billing");
  const seen=new Set();
  (ex||[]).forEach(x=>{
    seen.add(x.exp_date+"|"+r2(x.amount)+"|"+(x.ref||""));
    if(x.ref && x.ref!=="ACC-BILLING") seen.add("REF|"+x.ref);
  });
  const fresh=items.filter(i=>hasRef(i)?!seen.has("REF|"+i.ref):!seen.has(i.exp_date+"|"+r2(i.amount)+"|"+(i.ref||"")));
  if(!fresh.length){ alert("รายการทั้งหมดถูกบันทึกไว้แล้ว (กันซ้ำ)"); return; }
  const recs=fresh.map(i=>({exp_date:i.exp_date,category:cat,description:i.description,amount:i.amount,source:"acc_billing",ref:i.ref,is_cogs:cogs,created_by:"owner"}));
  const {error}=await sb.from("rev_expenses").insert(recs);
  if(error){ alert("บันทึกไม่สำเร็จ: "+error.message); return; }
  const skip=items.length-fresh.length;
  alert("บันทึก "+recs.length+" รายการ"+(skip?(" (ข้ามซ้ำ "+skip+")"):""));
  _accRows=null; await reloadAll(); tab("expense");
}

      options:{plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>TH0(v)}}}}});

/* ================= TAB 5: กำไรขั้นต้น ================= */
let chartGross=null;
function renderGross(){
  const el=document.getElementById("p_gross");
  const months=[...new Set([...STATE.audit.map(a=>monthKey(a.date)),...STATE.exp.map(x=>monthKey(x.exp_date))])].sort();
  const rev={},buy={},aud={},hol={},rngD={};
  months.forEach(m=>{rev[m]=0;buy[m]=0;aud[m]=0;hol[m]=0;rngD[m]=0;});
  STATE.audit.filter(a=>a.status==="ตรวจแล้ว").forEach(a=>{ const m=monthKey(a.date); if(rev[m]!=null){ rev[m]+=num(a.machine_net); aud[m]++; } });
  STATE.audit.filter(a=>a.status==="วันหยุด").forEach(a=>{ const m=monthKey(a.date); if(hol[m]!=null) hol[m]++; });
  STATE.exp.filter(x=>x.source==="shopee_income").forEach(x=>{ const m=monthKey(x.exp_date); if(rev[m]!=null) rev[m]+=num(x.amount); });
  /* "ซื้อในงวด" = รายจ่ายติดธงต้นทุน — ยังไม่ใช่ต้นทุนขาย */
  STATE.exp.filter(x=>x.is_cogs&&x.source!=="settlement").forEach(x=>{ const m=monthKey(x.exp_date); if(buy[m]!=null) buy[m]+=num(x.amount); });

  /* จำนวนวันของเดือนนั้น ที่อยู่ในช่วงวันที่ที่เลือก (ใช้เช็คความครบของข้อมูล) */
  const from=gFrom(), to=gTo();
  months.forEach(m=>{
    const y=+m.slice(0,4), mo=+m.slice(5,7);
    const mStart=y+"-"+pad2(mo)+"-01";
    const mEnd=y+"-"+pad2(mo)+"-"+pad2(new Date(y,mo,0).getDate());
    const a=(from>mStart?from:mStart), b=(to<mEnd?to:mEnd);
    rngD[m]=a>b?0:Math.round((new Date(b)-new Date(a))/86400000)+1;
  });

  const estPct=r2(document.getElementById("gp_est")?document.getElementById("gp_est").value:0);
  const useEst=estPct>0;
  /* ต้นทุนขาย: ใช้ % ประมาณกับ "ทุกเดือน" — ถ้าไม่ใส่ % = คำนวณไม่ได้ (null) ไม่เดาให้ */
  const cogsOf=m=>useEst?rev[m]*estPct/100:null;

  const incomplete=months.filter(m=>(aud[m]+hol[m])<rngD[m]);
  let warn="";
  if(incomplete.length){
    warn=`<div class="note" style="background:#fef2f2;border-color:#fca5a5">⚠️ <b>ข้อมูลยอดขายยังไม่ครบ</b> — `+
      incomplete.map(m=>`${beMonth(m)}: ตรวจแล้ว ${aud[m]} วัน${hol[m]?" (+วันหยุด "+hol[m]+")":""} จาก ${rngD[m]} วันในช่วงที่เลือก`).join(" · ")+
      `<br>ยอดขายที่เห็นจึงต่ำกว่าจริง อย่าเพิ่งใช้ตัดสินใจ</div>`;
  }
  const basisNote=useEst
    ? `<div class="note" style="background:#ecfdf5;border-color:#6ee7b7">✅ ต้นทุนขายคำนวณจาก <b>ยอดขาย × ${estPct}%</b> (ค่าประมาณ ใช้กับทุกเดือน)</div>`
    : `<div class="note" style="background:#fffbeb;border-color:#fcd34d">⚠️ <b>ยังคำนวณกำไรขั้นต้นไม่ได้</b> — “ซื้อในงวด” ไม่ใช่ “ต้นทุนขาย” (ของที่ซื้อมายังอยู่ในสต๊อก ยังไม่ได้ขาย)<br>
       สูตรจริง: <b>ต้นทุนขาย = สต๊อกต้นงวด + ซื้อในงวด − สต๊อกปลายงวด</b><br>
       ตอนนี้ยังไม่มีมูลค่าสต๊อกในระบบ → ใส่ “% ต้นทุนโดยประมาณ” ด้านล่างเพื่อดูกำไรคร่าวๆ ได้</div>`;

  let body=months.map(m=>{
    const cg=cogsOf(m);
    const gp=cg==null?null:rev[m]-cg, mg=(gp==null||rev[m]<=0)?null:(gp/rev[m]*100);
    const part=(aud[m]+hol[m])<rngD[m];
    return `<tr><td>${beMonth(m)} ${part?'<span class="chip" style="background:#dc2626;color:#fff">ข้อมูลไม่ครบ</span>':''}</td>
      <td class="n pos">${TH0(rev[m])}</td>
      <td class="n" style="color:#a16207">${buy[m]>0?TH0(buy[m]):"—"}</td>
      <td class="n neg">${cg==null?"—":TH0(cg)}${cg!=null?' <span class="chip kp">ประมาณ</span>':''}</td>
      <td class="n ${gp==null?'':(gp>=0?'pos':'neg')}">${gp==null?"—":TH0(gp)}</td>
      <td class="n">${mg==null?"—":mg.toFixed(1)+"%"}</td></tr>`;
  }).join("");

  const tR=months.reduce((s,m)=>s+rev[m],0);
  const tB=months.reduce((s,m)=>s+buy[m],0);
  const tC=useEst?months.reduce((s,m)=>s+cogsOf(m),0):null;
  const tGP=tC==null?null:tR-tC, tMg=(tGP==null||tR<=0)?null:(tGP/tR*100);

  el.innerHTML=`
  <div class="card">
    <h3>📈 กำไรขั้นต้น (ยอดขาย − ต้นทุนขาย)</h3>
    ${warn}
    ${basisNote}
    <div class="row" style="margin-bottom:8px">
      <label>ประมาณต้นทุน % ของยอดขาย (เว้นว่าง = ไม่คำนวณกำไร)</label>
      <input type="number" id="gp_est" step="1" min="0" max="100" style="width:90px" value="${estPct||''}" oninput="renderGross()"> %
    </div>
    ${months.length?`<div class="scroll"><table>
      <thead><tr><th>เดือน</th><th class="n">ยอดขาย</th><th class="n">ซื้อในงวด</th><th class="n">ต้นทุนขาย</th><th class="n">กำไรขั้นต้น</th><th class="n">% กำไร</th></tr></thead>
      <tbody>${body}</tbody>
      <tfoot><tr class="tot"><td>รวม</td><td class="n">${TH0(tR)}</td><td class="n">${TH0(tB)}</td>
        <td class="n">${tC==null?"—":TH0(tC)}</td><td class="n">${tGP==null?"—":TH0(tGP)}</td>
        <td class="n">${tMg==null?"—":tMg.toFixed(1)+"%"}</td></tr></tfoot>
    </table></div>
    <div class="muted" style="margin-top:6px">“ซื้อในงวด” = เงินที่จ่ายซื้อของเข้าสต๊อก · “ต้นทุนขาย” = ต้นทุนเฉพาะของที่ขายออกไปจริง · สองอันนี้ไม่เท่ากัน เดือนที่สั่งของเยอะ “ซื้อ” จะสูงแต่ไม่ได้แปลว่าขาดทุน</div>
    <canvas id="cGross" style="margin-top:12px"></canvas>`:`<div class="muted">ยังไม่มีข้อมูลยอดขายในช่วงนี้</div>`}
  </div>`;
  if(months.length){
    const ctx=document.getElementById("cGross"); if(chartGross) chartGross.destroy();
    const ds=[
      {type:"bar",label:"ยอดขาย",data:months.map(m=>rev[m]),backgroundColor:"#bbf7d0"},
      {type:"bar",label:"ซื้อในงวด",data:months.map(m=>buy[m]),backgroundColor:"#fde68a"}
    ];
    if(useEst) ds.push({type:"line",label:"กำไรขั้นต้น (ประมาณ)",data:months.map(m=>rev[m]-cogsOf(m)),borderColor:"#16a34a",backgroundColor:"#16a34a",tension:.2});
    chartGross=new Chart(ctx,{data:{labels:months.map(beMonth),datasets:ds},options:{scales:{y:{ticks:{callback:v=>TH0(v)}}}}});
  }
}
